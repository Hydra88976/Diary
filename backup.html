<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile Page</title>

<style>

@font-face {
  font-family: 'romanceking';
  /* Point to your exact .ttf file path */
  src: url('./romanceking.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'shalma';
  /* Point to your exact .ttf file path */
  src: url('./shalma.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'galteniya';
  /* Point to your exact .ttf file path */
  src: url('./Galteniya.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'abassy';
  /* Point to your exact .ttf file path */
  src: url('./abassy.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'family';
  /* Point to your exact .ttf file path */
  src: url('./family.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:#fff;
    height:100%;
    overflow-y:hidden;
    overflow: hidden;
    margin: 0;
}

.container{
    width:100%;
    max-width:1000px;
    margin:auto;
    padding:15px;
    /*background: green;*/
    /*overflow: hidden;*/
    max-height: 100vh;
    overflow-y: scroll;
    overflow-x: hidden;
    /*background: red;*/
}

/* Banner */
.banner{
    width:100%;
    height:140px;
    background:#151515;
    border-radius:15px;
    margin-bottom:60px;
    background: url("city1.png");
    background-size: cover;
    background-repeat: no-repeat;
}

/* Profile Section */
.profile-top{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    margin-top:-90px;
    /*gap: 45px;*/
    /*background: green;*/
}

.avatar-wrapper{
    position:relative;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #000;
    object-fit:cover;
    display:block;
}

.plus-btn{
    position:absolute;
    right:0;
    bottom:0;
    width:35px;
    height:35px;
    border-radius:50%;
    border:none;
    background:#fff;
    color:#000;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
}

.stats{
    display:flex;
    gap:35px;
    
    flex: 1;
    justify-content: space-around;
    margin-left: 10px;
}

.stat{
    text-align:center;
}

.stat h2{
    font-size:20px;
}

.stat p{
    font-size:15px;
    color:#ddd;
}

/* Name */
.username{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

/* Banner Button */
.banner-btn{
    margin-top:15px;
}

.banner-btn button{
    background:transparent;
    border:1px solid #444;
    color:#fff;
    padding:5px 10px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}

/* Action Buttons */
.actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.actions button{
    flex:1;
    background:#2a2f38;
    color:#fff;
    border:none;
    padding:10px;
    border-radius:10px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

.icon-btn{
    flex:0.25 !important;
}

/* Scroll Content */
.content{
    margin-top:25px;
}

.post{
    height:180px;
    background:#111;
    border-radius:15px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#888;
    font-size:18px;
}




.inner
{
    width: 500px;
    max-width:500px;
    background:#222;
    border-radius:10px;
    overflow:hidden; /* keeps header/footer corners rounded */
    color:white;
    
    margin-top: 25px;
    /*background: green;*/
    
    background: url("bg4.jpeg");
    background-size: cover;
    background-repeat: no-repeat;
}
.card
{
    display: flex;
    align-items: center;
    justify-content: center;
    /*background: red;*/
    
}

.header{
    /*background:#444;*/
    /* display: flex;*/
    padding:1px;
    text-align:center;
    font-size: 40px;
    align-items: center;
    gap: 10px;
    font-family: 'galteniya';
    color: black;
    /*backgroundt: bold;
    background: red;*/
    height: 50px;
    overflow: hidden;
}

.data{
    padding-left:20px;
    padding-right: 20px;
    padding-top: 5px;
    min-height:300px;
   /* background: url("bg4.jpeg");
    background-size: cover;
    background-repeat: no-repeat;*/
    
    font-family: 'family';
    color: black;
    font-size: 30px;
    font-weight: ;
}

.footer{
    background:#444;
    padding:5px;
    text-align:center;
}

.dummy
{
    height: 40px;
    width: 40px;
    border-radius: 50%;
}



/* Popup */

.popup-overlay{
    position:relative;
    inset:0;
    /*background:rgba(0,0,0,0.75);*/
    display:none;
    justify-content:center;
    align-items:flex-start;
    z-index:1000;
    padding:20px;
    
    /*transform: translate(-50%, -50%);
    left: 50%;
    top: -15rem;*/
    /*background: red;*/
    overflow: hidden;
    max-width: 500px;
    /*height: calc(100vh - 10vh);*/
    transform: translate(-50%, -50%);
    top: -16rem;
    left: 50%;
    width: 100%;
    
    
}

.popup-overlay-js
{
    position: absolute;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    display: none;
    top: 50px;
    left: 0;
    right: 0;
    padding: 20px;
    
}

.popup{
    width:100%;
    max-width:400px;
    background:#181818;
    border-radius:20px;
    padding:20px;
    
    margin-top: 10px;
    overflow: hidden;
    overflow-y: auto;
    
    
}

.popup h2{
    margin-bottom:15px;
}

.popup label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
}

.popup input,
.popup textarea{
    width:100%;
    background:#2a2f38;
    border:none;
    outline:none;
    color:#fff;
    padding:12px;
    border-radius:10px;
}

.popup textarea{
    min-height:120px;
    resize:vertical;
}

.popup-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.popup-buttons button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.cancel-btn{
    background:#444;
    color:#fff;
}

.save-btn{
    background:#fff;
    color:#000;
}


</style>
</head>

<body>

<div class="container">

    <div class="banner"></div>

    <div class="profile-top">

        <div class="avatar-wrapper">
            <img src="https://picsum.photos/200" class="avatar">
            <button class="plus-btn">+</button>
        </div>

        <div class="stats">
            <div class="stat">
                <h2>1</h2>

            <div class="stat">

            </div>
        </div>

    </div>

    <div class="username">Username</div>

    <div class="banner-btn">
        <button onclick="openPopup()">+ Add banners</button>
    </div>

    <div class="actions">
        <button>Edit profile</button>
        <button>Share profile</button>
       <button class="icon-btn">👥</button>
    </div>

<!-- Popup -->

<div class="popup-overlay" id="popup">
    <div class="popup">

        <h2>Create Banner</h2>

        <label>Title</label>
        <input type="text" placeholder="Enter title">

        <label>Subtitle</label>
        <input type="text" placeholder="Enter subtitle">

        <label>Description</label>
        <textarea placeholder="Enter description"></textarea>

        <div class="popup-buttons">
            <button class="cancel-btn" onclick="closePopup()">Cancel</button>
            <button class="save-btn">Save</button>
        </div>

    </div>
</div>


<script>
function openPopup(){
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}
