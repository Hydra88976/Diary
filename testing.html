<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>

<body>
  
  
  <div class="popup-overlay" id="popup">
  
  <div class="popup-side left-side">
    <!-- Your logo/image -->
    jdjdj
  </div>
  
  <div class="popup">
    <!-- Form Content -->
  </div>
  
  <div class="popup-side right-side">
    <!-- Your logo/image -->
    jdjdj
  </div>
  
</div>


<style>
  .popup-overlay {
  position: fixed;
  inset: 0;
  
  display: flex;
  
  width: 100vw;
  height: 100dvh;
  
  background: #000;
  
  z-index: 9999;
}

.popup {
  width: 100%;
  max-width: 500px;
  
  background: #181818;
  
  overflow-y: auto;
  
  padding: 20px;
}

.popup-side {
  flex: 1;
  
  display: flex;
  justify-content: center;
  align-items: center;
  background: red;
  
  overflow: hidden;
}

/* Desktop */

@media (min-width:768px) {
  
  .popup-overlay {
    display: flex;
    justify-content: center;
    align-items: stretch;
  }
  
  .popup {
    height: 100%;
  }
}

/* Mobile */

@media (max-width:767px) {
  
  .popup-overlay {
    justify-content: center;
  }
  
  .popup {
    width: 100%;
    max-width: none;
    height: 100%;
  }
  
  .popup-side {
    display: none;
  }
}
</style>
  
  
  
  
  
</body>

</html>
